<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cipher &mdash; Host</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #ff2d2d; --red-glow: #ff2d2d44;
    --green: #00e676; --green-glow: #00e67644;
    --gold: #ffc400; --gold-glow: #ffc40044;
    --blue: #40c4ff; --blue-glow: #40c4ff44;
    --bg: #080810; --surface: #0f0f1a; --surface2: #16162a; --surface3: #1e1e35;
    --border: #ffffff11; --text: #f0ede8; --muted: #555577;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none; z-index: 0;
  }

  /* Topbar */
  .topbar {
    position: relative; z-index: 10;
    display: flex; align-items: center; gap: 16px;
    padding: 12px 20px;
    background: var(--surface); border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 5px; color: var(--text); }
  .logo span { color: var(--red); }
  .host-tag { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); background: var(--surface2); border: 1px solid var(--border); padding: 3px 10px; border-radius: 99px; }
  .round-tag { font-family: 'Bebas Neue', sans-serif; font-size: 14px; letter-spacing: 2px; background: var(--surface2); border: 1px solid var(--border); padding: 3px 12px; border-radius: 99px; color: var(--muted); }
  .conn-tag { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; padding: 3px 10px; border-radius: 99px; margin-left: auto; }
  .conn-tag.live { background: var(--green)22; border: 1px solid var(--green)44; color: var(--green); }
  .conn-tag.dead { background: var(--red)22; border: 1px solid var(--red)44; color: var(--red); }

  /* Status bar */
  .statusbar {
    position: relative; z-index: 10;
    display: flex; gap: 0;
    background: var(--surface2); border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .status-item {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 20px; border-right: 1px solid var(--border);
    font-size: 12px;
  }
  .si-label { color: var(--muted); letter-spacing: 1px; text-transform: uppercase; font-size: 10px; }
  .si-val { font-weight: 600; font-family: 'Bebas Neue', sans-serif; font-size: 16px; letter-spacing: 1px; }
  .si-val.open { color: var(--green); }
  .si-val.locked { color: var(--red); }

  /* Main layout */
  .main { flex: 1; display: grid; grid-template-columns: 280px 1fr 280px; overflow: hidden; position: relative; z-index: 10; }

  /* Panels */
  .panel { overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
  .panel-left { border-right: 1px solid var(--border); background: var(--surface)88; }
  .panel-center { background: transparent; }
  .panel-right { border-left: 1px solid var(--border); background: var(--surface)88; }

  .panel-title { font-family: 'Bebas Neue', sans-serif; font-size: 13px; letter-spacing: 4px; color: var(--muted); margin-bottom: 4px; }

  /* Card */
  .card { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 14px; }

  /* Buttons */
  .btn { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 11px 16px; border-radius: 8px; border: none; font-family: 'Outfit', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; width: 100%; transition: all 0.15s; letter-spacing: 0.5px; }
  .btn:active { transform: scale(0.97); }
  .btn-green  { background: var(--green); color: #000; box-shadow: 0 4px 20px var(--green-glow); }
  .btn-green:hover  { background: #4dffa0; box-shadow: 0 6px 24px var(--green-glow); }
  .btn-red    { background: var(--red)22; border: 1px solid var(--red)66; color: var(--red); }
  .btn-red:hover    { background: var(--red)33; }
  .btn-gold   { background: var(--gold); color: #000; box-shadow: 0 4px 20px var(--gold-glow); }
  .btn-gold:hover   { background: #ffd740; }
  .btn-ghost  { background: var(--surface3); border: 1px solid var(--border); color: var(--muted); }
  .btn-ghost:hover  { border-color: #ffffff33; color: var(--text); }
  .btn-blue   { background: var(--blue)22; border: 1px solid var(--blue)44; color: var(--blue); }
  .btn-blue:hover   { background: var(--blue)33; }
  .btn-sm { padding: 7px 12px; font-size: 12px; }

  /* Buzz display (center) */
  .buzz-hero {
    background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
    padding: 32px; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 12px;
    transition: border-color 0.3s;
  }
  .buzz-hero.has-winner { border-color: var(--green)44; background: var(--green)05; }
  .buzz-eyebrow { font-size: 10px; letter-spacing: 4px; text-transform: uppercase; color: var(--muted); }
  .buzz-name { font-family: 'Bebas Neue', sans-serif; font-size: 56px; letter-spacing: 4px; color: var(--green); text-shadow: 0 0 30px var(--green-glow); line-height: 1; }
  .buzz-empty { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 4px; color: var(--muted); }
  .buzz-order-list { display: flex; flex-direction: column; gap: 6px; width: 100%; margin-top: 8px; }
  .buzz-order-item { display: flex; align-items: center; gap: 10px; padding: 8px 12px; background: var(--surface2); border-radius: 6px; border: 1px solid var(--border); }
  .boi-num { font-family: 'Bebas Neue', sans-serif; font-size: 18px; color: var(--muted); min-width: 24px; }
  .boi-num.first { color: var(--gold); }
  .boi-name { flex: 1; font-size: 14px; font-weight: 600; text-align: left; }

  /* Timer display */
  .timer-hero { font-family: 'Bebas Neue', sans-serif; font-size: 72px; color: var(--gold); text-shadow: 0 0 20px var(--gold-glow); text-align: center; letter-spacing: 4px; min-height: 80px; transition: color 0.3s; }
  .timer-hero.urgent { color: var(--red); text-shadow: 0 0 20px var(--red-glow); animation: urgBlink 0.4s infinite; }
  @keyframes urgBlink { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* Timer controls */
  .timer-row { display: flex; gap: 8px; align-items: center; }
  .timer-input { background: var(--surface3); border: 1px solid var(--border); color: var(--text); font-family: 'Bebas Neue', sans-serif; font-size: 20px; padding: 8px 12px; border-radius: 8px; width: 72px; text-align: center; outline: none; }
  .timer-input:focus { border-color: var(--gold); }

  /* Teams list */
  .team-row { display: flex; align-items: center; gap: 8px; padding: 9px 12px; background: var(--surface3); border: 1px solid var(--border); border-radius: 8px; transition: border-color 0.2s; }
  .team-row.buzzed-first { border-color: var(--green)44; background: var(--green)08; }
  .tr-rank { font-family: 'Bebas Neue', sans-serif; font-size: 16px; color: var(--muted); min-width: 20px; }
  .tr-rank.gold { color: var(--gold); }
  .tr-name { flex: 1; font-size: 13px; font-weight: 600; cursor: pointer; transition: color 0.15s; }
  .tr-name:hover { color: var(--gold); }
  .tr-name.selected { color: var(--gold); }
  .tr-score { font-family: 'Bebas Neue', sans-serif; font-size: 24px; color: var(--gold); min-width: 36px; text-align: right; }
  .score-btns { display: flex; gap: 4px; }
  .sc-btn { width: 28px; height: 28px; border-radius: 5px; border: none; font-size: 13px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .sc-btn.plus  { background: var(--green)22; color: var(--green); border: 1px solid var(--green)44; }
  .sc-btn.minus { background: var(--red)22;   color: var(--red);   border: 1px solid var(--red)44;   }
  .sc-btn:hover { opacity: 0.8; }
  .rm-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 14px; padding: 2px 4px; }
  .rm-btn:hover { color: var(--red); }

  /* Selected team indicator */
  .selected-indicator { font-size: 11px; color: var(--muted); text-align: center; padding: 4px; letter-spacing: 1px; }
  .selected-indicator span { color: var(--gold); }

  /* Divider */
  .divider { border: none; border-top: 1px solid var(--border); }

  /* Password screen */
  .pw-screen { position: fixed; inset: 0; z-index: 999; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; }
  .pw-logo { font-family: 'Bebas Neue', sans-serif; font-size: 48px; letter-spacing: 8px; color: var(--text); }
  .pw-logo span { color: var(--red); }
  .pw-sub { font-size: 11px; letter-spacing: 4px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
  .pw-input { background: var(--surface2); border: 1px solid var(--border); color: var(--text); font-family: 'Outfit', sans-serif; font-size: 18px; padding: 14px 20px; border-radius: 10px; width: 280px; outline: none; text-align: center; letter-spacing: 4px; }
  .pw-input:focus { border-color: var(--red); box-shadow: 0 0 0 3px var(--red-glow); }
  .pw-btn { background: var(--red); border: none; color: #fff; font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 4px; padding: 14px; border-radius: 10px; cursor: pointer; width: 280px; box-shadow: 0 4px 20px var(--red-glow); transition: all 0.15s; }
  .pw-btn:hover { background: #ff5252; transform: translateY(-2px); }
  .pw-error { color: var(--red); font-size: 12px; letter-spacing: 1px; min-height: 16px; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<!-- PASSWORD SCREEN -->
<div class="pw-screen" id="pw-screen">
  <div class="pw-logo">CI<span>PH</span>ER</div>
  <div class="pw-sub">Host Access Only</div>
  <input class="pw-input" id="pw-input" type="password" placeholder="Password" />
  <button class="pw-btn" onclick="checkPassword()">ENTER</button>
  <div class="pw-error" id="pw-error"></div>
</div>

<div class="topbar">
  <div class="logo">CI<span>PH</span>ER</div>
  <div class="host-tag">Host Panel</div>
  <div class="round-tag" id="round-tag">Round 1</div>
  <div class="conn-tag live" id="conn-tag">● Live</div>
</div>

<div class="statusbar">
  <div class="status-item"><div class="si-label">Buzzer</div><div class="si-val locked" id="sb-status">Locked</div></div>
  <div class="status-item"><div class="si-label">Teams</div><div class="si-val" id="sb-teams">0</div></div>
  <div class="status-item"><div class="si-label">Buzzed</div><div class="si-val" id="sb-buzzed">—</div></div>
  <div class="status-item"><div class="si-label">Round</div><div class="si-val" id="sb-round">1</div></div>
</div>

<div class="main">

  <!-- LEFT: Controls -->
  <div class="panel panel-left">
    <div class="panel-title">Buzzer Control</div>
    <button class="btn btn-green" onclick="send({type:'unlock'})">🔓 Unlock Buzzer</button>
    <button class="btn btn-ghost" onclick="send({type:'reset'})">&#x21BA; Reset Buzz</button>
    <button class="btn btn-gold"  onclick="nextRound()">&#x23ED; Next Round</button>

    <hr class="divider">
    <div class="panel-title">Quick Score</div>
    <div class="selected-indicator" id="sel-label">Click a team to select</div>
    <div style="display:flex;gap:8px;">
      <button class="btn btn-green btn-sm" style="flex:1;" onclick="scoreSelected(3)">+3</button>
      <button class="btn btn-red   btn-sm" style="flex:1;" onclick="scoreSelected(-1)">−1</button>
    </div>
  </div>

  <!-- CENTER: Buzz result -->
  <div class="panel panel-center">
    <div class="buzz-hero" id="buzz-hero">
      <div class="buzz-eyebrow">Buzz Order</div>
      <div class="buzz-empty">Waiting...</div>
    </div>
  </div>

  <!-- RIGHT: Teams & scores -->
  <div class="panel panel-right">
    <div class="panel-title">Teams &amp; Scores</div>
    <div id="teams-list">
      <div style="color:var(--muted);font-size:12px;text-align:center;padding:20px 0;">Waiting for teams to join...</div>
    </div>
  </div>

</div>

<script>
  // ── PASSWORD ──
  const PASSWORD = 'RasnaKaGuavaJuice'; // Change this to set the host password

  function checkPassword() {
    const val = document.getElementById('pw-input').value;
    if (val === PASSWORD) {
      document.getElementById('pw-screen').style.display = 'none';
      connect();
    } else {
      const err = document.getElementById('pw-error');
      err.textContent = 'Wrong password. Try again.';
      document.getElementById('pw-input').value = '';
      setTimeout(() => err.textContent = '', 3000);
    }
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && document.getElementById('pw-screen').style.display !== 'none') {
      checkPassword();
    }
  });

  let ws, gameState = null, selectedTeam = null;

  function connect() {
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(`${proto}//${location.host}/ws`);
    ws.onopen = () => {
      document.getElementById('conn-tag').textContent = '● Live';
      document.getElementById('conn-tag').className = 'conn-tag live';
    };
    ws.onmessage = e => {
      const d = JSON.parse(e.data);
      if (d.type === 'state') { gameState = d.state; updateUI(); }
    };
    ws.onclose = () => {
      document.getElementById('conn-tag').textContent = '○ Reconnecting';
      document.getElementById('conn-tag').className = 'conn-tag dead';
      setTimeout(connect, 2000);
    };
  }

  function send(msg) { if (ws && ws.readyState === 1) ws.send(JSON.stringify(msg)); }

  function nextRound() { send({type:'next_round'}); }

  function scoreSelected(delta) {
    if (!selectedTeam) { alert('Click a team name to select it first'); return; }
    send({type:'score', team: selectedTeam, delta});
  }

  function selectTeam(name) {
    selectedTeam = name;
    document.getElementById('sel-label').innerHTML = `Selected: <span>${name}</span>`;
    document.querySelectorAll('.tr-name').forEach(el => {
      el.classList.toggle('selected', el.dataset.name === name);
    });
  }

  function updateUI() {
    if (!gameState) return;
    const locked = gameState.locked;
    const buzzCount = gameState.buzz_order.length;

    // Status bar
    document.getElementById('sb-status').textContent = locked ? 'Locked' : 'Open';
    document.getElementById('sb-status').className = `si-val ${locked ? 'locked' : 'open'}`;
    document.getElementById('sb-teams').textContent = Object.keys(gameState.teams).length;
    document.getElementById('sb-buzzed').textContent = buzzCount || '—';
    document.getElementById('sb-round').textContent = gameState.round;
    document.getElementById('round-tag').textContent = `Round ${gameState.round}`;

    // Buzz hero
    const bh = document.getElementById('buzz-hero');
    if (buzzCount > 0) {
      bh.className = 'buzz-hero has-winner';
      bh.innerHTML = `
        <div class="buzz-eyebrow">First Buzz</div>
        <div class="buzz-name">${gameState.buzz_order[0]}</div>
        <div class="buzz-order-list">
          ${gameState.buzz_order.map((n,i) => `
            <div class="buzz-order-item">
              <div class="boi-num ${i===0?'first':''}">&#35;${i+1}</div>
              <div class="boi-name">${n}</div>
            </div>`).join('')}
        </div>`;
    } else {
      bh.className = 'buzz-hero';
      bh.innerHTML = `<div class="buzz-eyebrow">Buzz Order</div><div class="buzz-empty">${locked ? 'Buzzer Locked' : 'Waiting for buzz...'}</div>`;
    }

    // Teams
    const teams = Object.entries(gameState.teams).sort((a,b) => b[1].score - a[1].score);
    const tl = document.getElementById('teams-list');
    if (!teams.length) {
      tl.innerHTML = `<div style="color:var(--muted);font-size:12px;text-align:center;padding:20px 0;">Waiting for teams to join...</div>`;
      return;
    }
    tl.innerHTML = teams.map(([name, data], i) => {
      const isFirst = gameState.buzz_order[0] === name;
      return `<div class="team-row ${isFirst?'buzzed-first':''}">
        <div class="tr-rank ${i===0?'gold':''}">${i+1}</div>
        <div class="tr-name ${selectedTeam===name?'selected':''}" data-name="${name}" onclick="selectTeam('${name}')">${name}</div>
        <div class="score-btns">
          <button class="sc-btn plus"  onclick="send({type:'score',team:'${name}',delta:3})">+3</button>
          <button class="sc-btn minus" onclick="send({type:'score',team:'${name}',delta:-1})">&#8722;1</button>
        </div>
        <div class="tr-score">${data.score}</div>
        <button class="rm-btn" onclick="send({type:'remove_team',team:'${name}'})">&#x2715;</button>
      </div>`;
    }).join('');
  }

  // connect() called after password — not on load
</script>
</body>
</html>
